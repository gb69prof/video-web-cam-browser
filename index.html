<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Registratore Didattico</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Registratore Didattico</h1>
</header>

<div class="controls">
  <button onclick="startRecording()">▶️ REC</button>
  <button onclick="pauseRecording()">⏸ PAUSA</button>
  <button onclick="resumeRecording()">⏵ RIPRENDI</button>
  <button onclick="stopRecording()">⏹ STOP</button>
</div>

<div class="settings">
  Dimensione webcam:
  <input type="range" min="100" max="400" value="200" id="sizeSlider">
</div>

<canvas id="canvas"></canvas>

<script src="app.js"></script>
</body>
</html>
